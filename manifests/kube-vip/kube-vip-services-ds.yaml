apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip-services
  namespace: kube-system
  labels:
    app.kubernetes.io/name: kube-vip-services
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-vip-services
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-vip-services
    spec:
      hostNetwork: true
      serviceAccountName: kube-vip
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v0.8.9
          imagePullPolicy: IfNotPresent
          args:
            - manager
          env:
            - name: vip_arp
              value: "true"
            - name: vip_interface
              value: ens18
            - name: vip_subnet
              value: /32
            - name: cp_enable
              value: "false"
            - name: svc_enable
              value: "true"
            - name: svc_election
              value: "true"
            - name: vip_leaderelection
              value: "false"
            - name: vip_ddns
              value: "false"
            - name: prometheus_server
              value: ":2113"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
