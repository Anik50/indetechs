eck-elasticsearch:
  enabled: true
  fullnameOverride: elasticsearch
  version: 9.4.2

  nodeSets:
    - name: default
      count: 1

      config:
        node.store.allow_mmap: false
        xpack.ml.enabled: false

      podTemplate:
        spec:
          nodeSelector:
            kubernetes.io/hostname: kubeworker-1

          containers:
            - name: elasticsearch
              env:
                - name: ES_JAVA_OPTS
                  value: "-Xms256m -Xmx256m"

              resources:
                requests:
                  cpu: 150m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi

      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: nfs-csi
            resources:
              requests:
                storage: 10Gi

eck-kibana:
  enabled: true
  fullnameOverride: kibana

  spec:
    version: 9.4.2
    count: 1

    elasticsearchRef:
      name: elasticsearch

    podTemplate:
      spec:
        nodeSelector:
          kubernetes.io/hostname: kubeworker-2

        containers:
          - name: kibana
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi

    http:
      service:
        spec:
          type: ClusterIP

eck-beats:
  enabled: false

eck-logstash:
  enabled: false

eck-agent:
  enabled: false

eck-fleet-server:
  enabled: false

eck-apm-server:
  enabled: false

eck-enterprise-search:
  enabled: false
