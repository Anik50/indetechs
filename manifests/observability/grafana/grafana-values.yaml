replicas: 1

adminUser: admin
adminPassword: ChangeMe-Grafana-Lab-Only

service:
  type: ClusterIP

persistence:
  enabled: true
  storageClassName: nfs-csi
  size: 2Gi

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 512Mi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local
        isDefault: true
